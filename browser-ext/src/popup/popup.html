<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tangerine Settings</title>
    <style>
      :root {
        --orange: #cc5500;
        --navy: #1a1a2e;
        --bg: #ffffff;
        --fg: #1a1a2e;
        --muted: #6b6b75;
        --border: rgba(0, 0, 0, 0.1);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1f1f23;
          --fg: #ececec;
          --muted: #9a9aa3;
          --border: #2a2a30;
        }
      }
      html, body {
        font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--fg);
        margin: 0;
        padding: 0;
      }
      body { width: 320px; }
      .header {
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .header h1 { font-size: 14px; margin: 0; flex: 1; font-weight: 600; }
      .badge {
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 999px;
        background: rgba(204, 85, 0, 0.15);
        color: var(--orange);
      }
      .body { padding: 12px 14px; }
      .row { margin-bottom: 12px; }
      .row label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
      .row .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
      input[type="text"], input[type="number"] {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        font-size: 12px;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--bg);
        color: var(--fg);
        font-family: inherit;
      }
      input[type="text"]:focus, input[type="number"]:focus {
        outline: none;
        border-color: var(--orange);
      }
      .check { display: flex; align-items: center; gap: 6px; font-size: 12px; }
      .checks { display: flex; flex-direction: column; gap: 6px; }
      .footer {
        padding: 10px 14px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .status { font-size: 11px; color: var(--muted); flex: 1; }
      .status.ok { color: #2a8f3e; }
      .status.bad { color: var(--orange); }
      button {
        font-size: 12px;
        padding: 6px 12px;
        border-radius: 4px;
        border: none;
        cursor: pointer;
        font-family: inherit;
      }
      button.primary { background: var(--orange); color: white; font-weight: 600; }
      button.primary:hover { opacity: 0.9; }
      button.ghost { background: transparent; color: var(--fg); }
      button.ghost:hover { background: var(--border); }
    </style>
  </head>
  <body>
    <div class="header">
      <span style="font-size: 18px;">🍊</span>
      <h1>Tangerine memory</h1>
      <span class="badge">v0.1.0</span>
    </div>

    <div class="body">
      <div class="row">
        <label for="endpoint">Desktop app endpoint</label>
        <input id="endpoint" type="text" placeholder="ws://127.0.0.1:7780/memory" />
        <div class="hint">Localhost websocket exposed by the Tangerine desktop app.</div>
      </div>

      <div class="row">
        <label>Enabled sites</label>
        <div class="checks">
          <label class="check"><input type="checkbox" id="site-chatgpt" /> ChatGPT</label>
          <label class="check"><input type="checkbox" id="site-claude" /> Claude.ai</label>
          <label class="check"><input type="checkbox" id="site-gemini" /> Gemini</label>
        </div>
      </div>

      <div class="row">
        <label for="limit">Results per search</label>
        <input id="limit" type="number" min="1" max="20" />
      </div>

      <div class="row">
        <label class="check">
          <input type="checkbox" id="autoprefill" />
          Auto-prefill query from textarea
        </label>
      </div>

      <div class="row">
        <label class="check">
          <input type="checkbox" id="smartinject" />
          Smart inject (proactive)
        </label>
        <div class="hint">
          Watches your prompt as you type and pops a 🍊 chip when relevant team
          memory is found. Searches every ~1.5s on localhost; nothing leaves your
          machine. Off by default.
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="status" id="status">Checking…</div>
      <button class="ghost" id="btn-test">Test</button>
      <button class="primary" id="btn-save">Save</button>
    </div>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
