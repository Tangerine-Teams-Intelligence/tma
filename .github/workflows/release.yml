name: Release Tangerine AI Teams

"on":
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('app/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Python deps + PyInstaller
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller==6.6.0

      - name: Build frozen Python (PyInstaller --onedir)
        shell: pwsh
        working-directory: app/scripts
        run: |
          .\build_python.ps1

      - name: Verify Python bundle
        shell: pwsh
        run: |
          if (-not (Test-Path "app/resources/python/python.exe")) {
            Write-Error "Python bundle missing"
            exit 1
          }
          Get-ChildItem app/resources/python | Select-Object -First 20

      - name: Install bot deps + build TypeScript
        shell: pwsh
        working-directory: bot
        run: |
          npm ci
          npm run build

      - name: Install pkg globally
        shell: pwsh
        run: npm install -g pkg

      - name: Build frozen bot (pkg)
        shell: pwsh
        working-directory: app/scripts
        run: |
          .\build_bot.ps1

      - name: Verify bot bundle
        shell: pwsh
        run: |
          if (-not (Test-Path "app/resources/bot/tangerine-meeting-bot.exe")) {
            Write-Error "Bot bundle missing"
            exit 1
          }
          Get-ChildItem app/resources/bot

      - name: Install app deps
        shell: pwsh
        working-directory: app
        run: npm ci

      - name: Build Tauri app + NSIS installer
        shell: pwsh
        working-directory: app
        run: npm run tauri -- build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: List bundle artifacts (debug)
        if: always()
        shell: pwsh
        run: |
          if (Test-Path app/src-tauri/target/release/bundle) {
            Get-ChildItem -Recurse app/src-tauri/target/release/bundle
          } else {
            Write-Host "No bundle directory produced"
          }

      - name: Find installer artifact
        id: find_installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Recurse app/src-tauri/target/release/bundle/nsis -Filter "*.exe" -ErrorAction Stop | Select-Object -First 1
          if (-not $installer) {
            Write-Error "No NSIS installer found"
            exit 1
          }
          Write-Host "Found installer: $($installer.FullName)"
          "INSTALLER_PATH=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "INSTALLER_NAME=$($installer.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: tangerine-ai-teams-installer-windows
          path: ${{ steps.find_installer.outputs.INSTALLER_PATH }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Tangerine AI Teams ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          files: ${{ steps.find_installer.outputs.INSTALLER_PATH }}
          generate_release_notes: true
          body: |
            # Tangerine AI Teams ${{ github.ref_name }}

            **AI-native team coordination layer.** Captures team work (meetings, etc.) and writes structured diffs to your team's AI memory (CLAUDE.md, Cursor rules). Uses your existing Claude Code / Cursor session — we never call an LLM API. 0 data retention.

            ## Download

            Click the installer below to download. Run it. Follow the 5-step setup wizard.

            **Beta — unsigned**: Windows SmartScreen may flag this. Right-click the .exe → Properties → Unblock, then run.

            ## Setup time

            ~15 minutes for first meeting (Discord bot creation + API keys + team config).

            See [SETUP.md](https://github.com/${{ github.repository }}/blob/main/SETUP.md) for full walkthrough.

            ## What's in this beta

            - **Tangerine Meeting** skill — Discord meeting capture → Claude Code memory diff
            - Setup wizard: Discord bot + Whisper API key + Claude detection + team members
            - Apache-2.0 licensed

            ## Known limitations

            - Windows-only (Mac/Linux pending)
            - Unsigned (warning on first run is expected)
            - 9 more skills (Wiki / Track / Review / Schedule / Loom / Hire / Voice / Survey / Chat) coming v1.6+
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
